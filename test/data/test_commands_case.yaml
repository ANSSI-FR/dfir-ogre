plugin_prefixes:
  - test

case: test
output_folder: .tmp/output
temp_folder: .tmp/extract
plugin_folder: test/plugin_config/

mapping:
  - archive_file_pattern: '.*\.TXt'
    plugin_file: $plugin_folder/void.xml
    mapping_label: text_output
    output:
      - rawjson

output:
  rawjson:
    type: file
    format: jsonl
    date_format: iso
    with_timeline: false
    with_qualifiers: false
    output_folder: $output_folder/$archive_name/$mapping_label/
    base_file_name: $parser_$file_name
